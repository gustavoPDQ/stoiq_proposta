<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoIQ - Proposta Comercial</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0f172a;background:#f1f5f9}
.outer{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.frame{background:#fff;border-radius:12px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);overflow:hidden;display:flex;flex-direction:column;position:relative;height:calc(100vh - 3rem);aspect-ratio:16/9;max-width:100%;max-height:100%}
.frame-inner{width:100%;height:100%;display:flex;position:relative}
/* Sidebar */
.sidebar{width:96px;background:#1e3a8a;display:flex;flex-direction:column;align-items:center;padding:32px 0;justify-content:space-between;flex-shrink:0}
.sidebar-logo{width:48px;height:48px;background:#1d4ed8;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;box-shadow:inset 0 2px 4px rgba(0,0,0,.2)}
.sidebar-text{color:rgba(147,197,253,.4);font-family:monospace;font-size:12px;writing-mode:vertical-rl;transform:rotate(180deg);padding:48px 0;letter-spacing:1px}
.sidebar-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
/* Main */
.main{flex:1;position:relative;overflow:hidden;background:linear-gradient(to bottom right,#fff,#f8fafc)}
.slide-counter{position:absolute;top:24px;right:32px;font-size:14px;font-weight:600;color:#94a3b8;z-index:10}
.slide-area{height:100%;width:100%;padding:32px 48px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.slide-content{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
/* Nav */
.nav{position:absolute;bottom:32px;right:32px;display:flex;gap:16px;z-index:10}
.nav button{width:48px;height:48px;border-radius:50%;border:1px solid #e2e8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav .prev{background:#fff;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);color:#475569}
.nav .prev:hover{color:#2563eb}
.nav .next{background:#2563eb;box-shadow:0 4px 6px -1px rgba(59,130,246,.4);color:#fff;border-color:#2563eb}
.nav .next:hover{background:#1d4ed8}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.nav button svg{width:24px;height:24px}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.animate-fadeIn{animation:fadeIn .4s ease-out}
/* Slide containers */
.slide-std{display:flex;flex-direction:column;height:100%;width:100%;padding:32px 64px 56px;animation:fadeIn .4s ease-out}
.slide-std-compact{display:flex;flex-direction:column;height:100%;width:100%;padding:24px 56px 48px;animation:fadeIn .4s ease-out}
.slide-header h2{font-size:clamp(22px,3.5vh,36px);font-weight:700;color:#0f172a;margin-bottom:4px}
.slide-header p{font-size:clamp(14px,2vh,20px);color:#64748b}
/* Utility */
.grid{display:grid}.flex{display:flex}.flex-col{flex-direction:column}.flex-1{flex:1}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-5{gap:20px}.gap-6{gap:24px}.gap-8{gap:32px}
.text-center{text-align:center}.text-right{text-align:right}.text-left{text-align:left}
.font-bold{font-weight:700}.font-extrabold{font-weight:800}.font-semibold{font-weight:600}.font-medium{font-weight:500}
.rounded-xl{border-radius:12px}.rounded-2xl{border-radius:16px}.rounded-lg{border-radius:8px}.rounded-full{border-radius:9999px}
.shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.05)}.shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.1)}
.uppercase{text-transform:uppercase}.tracking-wide{letter-spacing:.05em}.italic{font-style:italic}
.whitespace-nowrap{white-space:nowrap}.leading-tight{line-height:1.25}.leading-snug{line-height:1.375}
.min-h-0{min-height:0}.overflow-hidden{overflow:hidden}.flex-shrink-0{flex-shrink:0}
.hidden{display:none!important}
/* Editable inputs */
.editable-input{background:transparent;outline:none;border:none;border-bottom:1px dashed currentColor;font-size:inherit;font-weight:inherit;color:inherit;text-align:inherit;min-width:3ch}
.editable-pct{background:transparent;outline:none;border:none;border-bottom:1px dashed currentColor;font-size:inherit;font-weight:inherit;color:inherit;text-align:center;min-width:2ch}
/* Tables */
table{border-collapse:collapse;width:100%}
th,td{padding:8px 12px}
/* Cover slide */
.cover-slide{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:32px;animation:fadeIn .4s ease-out}
.cover-icon{width:96px;height:96px;background:#1e40af;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:48px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1)}
.cover-icon svg{width:48px;height:48px;color:#fff}
.cover-pre{font-size:clamp(18px,2.5vw,30px);color:#64748b;font-weight:500}
.cover-main{font-size:clamp(36px,5vw,72px);color:#0f172a;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.cover-sub{font-size:clamp(16px,2vw,24px);color:#2563eb;font-weight:500;max-width:600px;margin-top:32px}
.cover-footer{padding-top:32px;border-top:1px solid #e2e8f0;width:100%;max-width:400px}
.cover-footer p{color:#64748b;font-weight:500}
.cover-cta{padding:16px 32px;background:#1d4ed8;color:#fff;border-radius:8px;font-weight:700;font-size:18px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,.1)}
.cover-cta:hover{background:#1e40af}
</style>
</head>
<body>
<div class="outer">
<div class="frame">
<div class="frame-inner">
<div class="sidebar">
<div class="sidebar-logo">S</div>
<div class="sidebar-text">STOIQ INTELLIGENCE</div>
<div class="sidebar-dot"></div>
</div>

</div>
</div>
</div>

function icon(name, size, cls) {
  size = size || 24;
  cls = cls || '';
  return '<span style="display:inline-flex;width:'+size+'px;height:'+size+'px;'+cls+'">'+icons[name]+'</span>';
}

// State
let currentSlide = 0;
let ganhoCalculadora = 0;
// Calculadora state
let calcFat = 500000, calcEst = 300000, calcCompra = 80000;
let calcBench = { pctEncalhe: 0.25, pctRuptura: 0.08, pctCompraErrada: 0.15 };
let calcMelh = { reducaoEncalhe: 0.40, reducaoRuptura: 0.50, reducaoCompraErrada: 0.50 };
const defaultBench = { pctEncalhe: 0.25, pctRuptura: 0.08, pctCompraErrada: 0.15 };
const defaultMelh = { reducaoEncalhe: 0.40, reducaoRuptura: 0.50, reducaoCompraErrada: 0.50 };

const totalSlides = 16;

function brl(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }); }
function brl2(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

function nextSlide() { if (currentSlide < totalSlides - 1) { currentSlide++; render(); } }
function prevSlide() { if (currentSlide > 0) { currentSlide--; render(); } }

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft') prevSlide();
});

function render() {
  document.getElementById('slideCounter').textContent = (currentSlide + 1) + ' / ' + totalSlides;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
  document.getElementById('slideContent').innerHTML = renderSlide(currentSlide);
  // Re-attach calculadora events if needed
  if (currentSlide === 13) attachCalcEvents();
}

function renderSlide(idx) {
  switch(idx) {
    case 0: return slideCover();
    case 1: return slideTeam();
    case 2: return slideClientInterview();
    case 3: return slideGridSmall();
    case 4: return slideDeliverables();
    case 5: return slideDataHealth();
    case 6: return slideStockStatus();
    case 7: return slideGiroEncalhados();
    case 8: return slideSugestaoCompra();
    case 9: return slideAcompanhamentoMeta();
    case 10: return slideTimeline();
    case 11: return slideNaoFazemos();
    case 12: return slidePremissas();
    case 13: return slideCalculadora();
    case 14: return slidePricing();
    case 15: return slideCoverFinal();
    default: return '';
  }
}

/* SLIDE 0 - Cover */
function slideCover() {
  return '<div class="cover-slide">' +
    '<div class="cover-icon">' + icons.barChart2 + '</div>' +
    '<div style="max-width:800px">' +
      '<div class="cover-pre">Gere caixa com</div>' +
      '<div class="cover-main">Inteligência de estoque</div>' +
    '</div>' +
    '<div class="cover-sub">Metodologia StoIQ</div>' +
    '<div class="cover-footer"><p>Proposta de trabalho</p></div>' +
  '</div>';
}

/* SLIDE 2 - Client Interview */
function slideClientInterview() {
  var sections = [
    { icon: 'store', label: 'História da empresa', question: 'Como surgiu a empresa? Qual é o modelo de negócio hoje (canais, produtos, estrutura)?' },

/* SLIDE 3 - Grid Small */

            '<p style="font-size:clamp(14px,2vh,20px);font-weight:700;color:#991b1b">Perda total / ano</p>' +
            '<p style="font-size:clamp(20px,3vh,32px);font-weight:800;color:#b91c1c">'+brl(perdaTotal)+'</p>' +

        '</div>' +

      '<div style="flex:1;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;display:flex;flex-direction:column;padding:clamp(10px,1.8vh,22px)">' +
        '<p style="font-size:clamp(12px,1.6vh,16px);font-weight:700;color:#16a34a;text-transform:uppercase;letter-spacing:.05em">Com a StoIQ: quanto você recupera</p>' +

          gainRow('Liberação de caixa','redução de encalhe',econEncalhe,'reducaoEncalhe') +
          gainRow('Faturamento recuperado','redução de ruptura',econRuptura,'reducaoRuptura') +
          gainRow('Economia em compras','redução de compra errada',econCompra,'reducaoCompraErrada') +
          '<div style="background:#16a34a;border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:clamp(10px,1.5vh,18px) clamp(10px,1vw,18px);margin-top:auto">' +
            '<p style="font-size:clamp(14px,2vh,20px);font-weight:700;color:#fff">Ganho total / ano</p>' +
            '<p style="font-size:clamp(20px,3vh,32px);font-weight:800;color:#fff">+ '+brl(ganhoTotal)+'</p>' +

}

function attachCalcEvents() {
  var fatInput = document.getElementById('calcFat');
  var estInput = document.getElementById('calcEst');
  var compraInput = document.getElementById('calcCompra');
  if (!fatInput) return;

  function parseNum(s) { return Number(String(s).replace(/\D/g, '')) || 0; }

  function onMainChange() {
    calcFat = parseNum(fatInput.value);
    calcEst = parseNum(estInput.value);
    calcCompra = parseNum(compraInput.value);
    render();
  }
  [fatInput, estInput, compraInput].forEach(function(inp) {
    inp.addEventListener('focus', function() { this.value = String(this.value).replace(/\D/g, ''); this.select(); });
    inp.addEventListener('blur', function() { onMainChange(); });
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { this.blur(); } });
  });

  document.querySelectorAll('.calc-pct').forEach(function(inp) {
    inp.addEventListener('focus', function() { this.select(); });
    inp.addEventListener('blur', function() {
      var val = Math.min(100, Math.max(0, parseNum(this.value))) / 100;
      var key = this.getAttribute('data-key');
      var parts = key.split('.');
      if (parts[0] === 'bench') calcBench[parts[1]] = val;
      else calcMelh[parts[1]] = val;
      render();
    });
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { this.blur(); } });
  });
}
